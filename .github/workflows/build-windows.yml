name: Build release executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller imageio numpy scipy pycryptodome numba Pillow

      - name: Build native extensions
        run: |
          python setup-win.py build

      - name: Build executable
        run: |
          pyinstaller hstego-win.spec

      - name: Show build output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse dist

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: hstego-0.6-windows
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libjpeg-dev python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller imageio numpy scipy pycryptodome numba Pillow

      - name: Build native extensions
        run: |
          python setup.py build

      - name: Build executable
        run: |
          pyinstaller hstego-linux.spec

      - name: Show build output
        run: |
          ls -l dist

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: hstego-0.6-linux
          path: dist/hstego-0.6-linux.x86_64

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          brew install jpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller imageio numpy scipy pycryptodome numba Pillow

      - name: Build native extensions
        run: |
          python setup-mac.py build

      - name: Build executable
        run: |
          pyinstaller hstego-mac.spec

      - name: Show build output
        run: |
          ls -l dist

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: hstego-0.6-macos
          path: dist/hstego-0.6-macosx.universal
