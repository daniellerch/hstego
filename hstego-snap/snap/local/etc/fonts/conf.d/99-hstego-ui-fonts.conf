<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <alias binding="strong">
    <family>Helvetica</family>
    <prefer>
      <family>Liberation Sans Narrow</family>
    </prefer>
  </alias>
  <alias binding="same">
    <family>sans-serif</family>
    <prefer>
      <family>Liberation Sans Narrow</family>
    </prefer>
  </alias>
</fontconfig>
